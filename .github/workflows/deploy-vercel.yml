name: Deploy to Vercel Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Trigger Vercel Deployment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install jq (for JSON parsing)
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Trigger Vercel Deploy Hook
        env:
          HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "::error::VERCEL_DEPLOY_HOOK_URL secret is missing"
            exit 1
          fi

          echo "🚀 Triggering Vercel deployment..."
          # احصل على كود الحالة + احفظ الرد في ملف
          HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" -X POST "$HOOK_URL" -H "Content-Type: application/json")

          echo "HTTP: $HTTP_CODE"
          echo "Response:"
          cat response.json

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Vercel hook returned HTTP $HTTP_CODE"
            exit 1
          fi

          # استخرج الـJob ID بشكل آمن (إن وُجد)
          JOB_ID=$(jq -r '.job.id // empty' response.json)
          if [ -n "$JOB_ID" ]; then
            echo "✅ Deployment triggered successfully"
            echo "Job ID: $JOB_ID"
            echo "::notice::Vercel deployment started with Job ID: $JOB_ID"
          else
            echo "⚠️ No job.id in response (may still be fine if Vercel accepted the hook)"
          fi

      - name: Wait for deployment to start
        run: |
          echo "⏳ Waiting ~60s..."
          sleep 60

      - name: Quick verify public URLs
        env:
          PROD_URL: ${{ secrets.PROD_URL }}
          WWW_URL:  ${{ secrets.WWW_URL }}
          FALLBACK: ${{ secrets.FALLBACK_URL }}
        run: |
          check_url () {
            URL="$1"
            if [ -n "$URL" ]; then
              CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
              echo "$URL -> $CODE"
              # بعض المواقع ممكن ترجع 200/301/302/308 حسب إعادة التوجيه أو CDN
              if [ "$CODE" = "200" ] || [ "$CODE" = "301" ] || [ "$CODE" = "302" ] || [ "$CODE" = "308" ]; then
                echo "OK: $URL"
              else
                echo "WARN: $URL returned $CODE"
              fi
            fi
          }

          echo "🔍 Checking public URLs (if provided as secrets):"
          check_url "$PROD_URL"
          check_url "$WWW_URL"
          check_url "$FALLBACK"

          echo "::notice::Quick verification step completed"
